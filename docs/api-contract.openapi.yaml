openapi: 3.0.3
info:
  title: TechTalk API
  version: 1.0.0
  description: |
    Frontend-consumable API contract for the Laravel backend.

    Notes:
    - Default JSON envelope:
      - success: { status: success, message, data }
      - error: { status: error, message, errors? }
    - Paginated endpoints include `pagination` metadata.
    - `POST /generate-uml` returns binary `image/png`, not JSON.
servers:
  - url: /api
    description: API base path
tags:
  - name: Auth
  - name: Users
  - name: Profile
  - name: Posts
  - name: Blogs
  - name: Sections
  - name: Comments
  - name: Notifications
  - name: Activity
  - name: Saved
  - name: Views
  - name: Tags
  - name: Roadmaps
  - name: Search
  - name: Utilities

paths:
  /register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registered (OTP required for authentication)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: '#/components/schemas/UserModel'
                          user_id:
                            type: integer
        '422':
          $ref: '#/components/responses/ValidationError'

  /login:
    post:
      tags: [Auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Logged in
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: '#/components/schemas/UserModel'
                          access_token:
                            type: string
                          token_type:
                            type: string
                            example: Bearer
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '422':
          $ref: '#/components/responses/ValidationError'

  /logout:
    post:
      tags: [Auth]
      summary: Logout current/all devices
      security:
        - BearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'
        '401':
          $ref: '#/components/responses/Error401'

  /forgot-password:
    post:
      tags: [Auth]
      summary: Request reset password link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'
        '422':
          $ref: '#/components/responses/ValidationError'

  /reset-password:
    post:
      tags: [Auth]
      summary: Reset password with token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, token, password, password_confirmation]
              properties:
                email:
                  type: string
                  format: email
                token:
                  type: string
                password:
                  type: string
                password_confirmation:
                  type: string
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'
        '422':
          $ref: '#/components/responses/ValidationError'

  /otp/verify:
    post:
      tags: [Auth]
      summary: Verify OTP and issue token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code]
              properties:
                email:
                  type: string
                  format: email
                code:
                  type: string
      responses:
        '200':
          description: OTP verified
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: '#/components/schemas/UserModel'
                          access_token:
                            type: string
                          token_type:
                            type: string
                            example: Bearer
        '404':
          $ref: '#/components/responses/Error404'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/Error429'

  /otp/resend:
    post:
      tags: [Auth]
      summary: Resend OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                channel:
                  type: string
                  enum: [email, sms]
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'
        '404':
          $ref: '#/components/responses/Error404'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/Error429'

  /change-password:
    post:
      tags: [Auth]
      summary: Change password
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, password, password_confirmation]
              properties:
                current_password:
                  type: string
                password:
                  type: string
                password_confirmation:
                  type: string
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'
        '401':
          $ref: '#/components/responses/Error401'
        '422':
          $ref: '#/components/responses/ValidationError'

  /change-name:
    post:
      tags: [Auth]
      summary: Change display name
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, password]
              properties:
                name:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Name updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          name:
                            type: string
        '401':
          $ref: '#/components/responses/Error401'
        '422':
          $ref: '#/components/responses/ValidationError'

  /updateusername:
    post:
      tags: [Users]
      summary: Update username
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Username updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserSummary'
        '401':
          $ref: '#/components/responses/Error401'
        '422':
          $ref: '#/components/responses/ValidationError'

  /updateemail:
    post:
      tags: [Users]
      summary: Request email change (OTP required)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'
        '401':
          $ref: '#/components/responses/Error401'
        '422':
          $ref: '#/components/responses/ValidationError'

  /posts:
    get:
      tags: [Posts]
      summary: List published posts
      responses:
        '200':
          $ref: '#/components/responses/PaginatedPosts'
    post:
      tags: [Posts]
      summary: Create post
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/StorePostRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/StorePostRequest'
      responses:
        '201':
          $ref: '#/components/responses/SuccessPost'
        '401':
          $ref: '#/components/responses/Error401'
        '422':
          $ref: '#/components/responses/ValidationError'

  /posts/{post}:
    get:
      tags: [Posts]
      summary: Get post by id
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '200':
          $ref: '#/components/responses/SuccessPost'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
    put:
      tags: [Posts]
      summary: Deprecated legacy update endpoint
      deprecated: true
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '404':
          $ref: '#/components/responses/Error404'
    delete:
      tags: [Posts]
      summary: Delete post
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'

  /posts/{post}/content:
    put:
      tags: [Posts]
      summary: Update post content
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePostContentRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessPost'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '422':
          $ref: '#/components/responses/ValidationError'

  /posts/{post}/photos:
    post:
      tags: [Posts]
      summary: Add photo to post
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [photo]
              properties:
                photo:
                  type: string
                  format: binary
      responses:
        '200':
          $ref: '#/components/responses/SuccessPost'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '422':
          $ref: '#/components/responses/ValidationError'

  /posts/{post}/photos/{photo}:
    put:
      tags: [Posts]
      summary: Replace photo
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostId'
        - $ref: '#/components/parameters/PhotoId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [photo]
              properties:
                photo:
                  type: string
                  format: binary
      responses:
        '200':
          $ref: '#/components/responses/SuccessPost'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Posts]
      summary: Delete photo
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostId'
        - $ref: '#/components/parameters/PhotoId'
      responses:
        '200':
          $ref: '#/components/responses/SuccessPost'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'

  /posts/recommended:
    get:
      tags: [Posts]
      summary: Get recommended posts
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 30
      responses:
        '200':
          $ref: '#/components/responses/PaginatedPosts'
        '401':
          $ref: '#/components/responses/Error401'

  /posts/drafts:
    get:
      tags: [Posts]
      summary: List current user drafts
      security:
        - BearerAuth: []
      responses:
        '200':
          $ref: '#/components/responses/PaginatedPosts'
        '401':
          $ref: '#/components/responses/Error401'

  /posts/viewers/{id}:
    get:
      tags: [Posts]
      summary: List post viewers (owner only)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Viewer list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          viewers:
                            type: array
                            items:
                              $ref: '#/components/schemas/Viewer'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'

  /posts/{post}/toggle-like:
    post:
      tags: [Posts]
      summary: Toggle like on post
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '200':
          description: Like toggled
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          is_liked:
                            type: boolean
                          likes_count:
                            type: integer
        '401':
          $ref: '#/components/responses/Error401'
        '404':
          $ref: '#/components/responses/Error404'

  /posts/{post}/comments:
    get:
      tags: [Comments]
      summary: List post comments
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '200':
          $ref: '#/components/responses/PaginatedComments'
        '404':
          $ref: '#/components/responses/Error404'

  /blogs:
    get:
      tags: [Blogs]
      summary: List published blogs
      responses:
        '200':
          $ref: '#/components/responses/PaginatedBlogs'
    post:
      tags: [Blogs]
      summary: Create blog
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/StoreBlogRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/StoreBlogRequest'
      responses:
        '201':
          $ref: '#/components/responses/SuccessBlog'
        '401':
          $ref: '#/components/responses/Error401'
        '422':
          $ref: '#/components/responses/ValidationError'

  /blogs/{blog}:
    get:
      tags: [Blogs]
      summary: Get blog by id
      parameters:
        - $ref: '#/components/parameters/BlogId'
      responses:
        '200':
          $ref: '#/components/responses/SuccessBlog'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
    put:
      tags: [Blogs]
      summary: Update blog
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BlogId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UpdateBlogRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBlogRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessBlog'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '422':
          $ref: '#/components/responses/ValidationError'
    patch:
      tags: [Blogs]
      summary: Partial update blog
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BlogId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBlogRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessBlog'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Blogs]
      summary: Delete blog
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BlogId'
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'

  /blogs/{blog}/toggle-like:
    post:
      tags: [Blogs]
      summary: Toggle like on blog
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BlogId'
      responses:
        '200':
          description: Like toggled
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          is_liked:
                            type: boolean
                          likes_count:
                            type: integer
        '401':
          $ref: '#/components/responses/Error401'

  /blogs/drafts:
    get:
      tags: [Blogs]
      summary: List current user blog drafts
      security:
        - BearerAuth: []
      responses:
        '200':
          $ref: '#/components/responses/PaginatedBlogs'
        '401':
          $ref: '#/components/responses/Error401'

  /blogs/viewers/{id}:
    get:
      tags: [Blogs]
      summary: List blog viewers (owner only)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Viewer list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          viewers:
                            type: array
                            items:
                              $ref: '#/components/schemas/Viewer'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'

  /blogs/{blog}/comments:
    get:
      tags: [Comments]
      summary: List blog comments
      parameters:
        - $ref: '#/components/parameters/BlogId'
      responses:
        '200':
          $ref: '#/components/responses/PaginatedComments'

  /blogs/{blog}/sections:
    post:
      tags: [Sections]
      summary: Create section for blog
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BlogId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/StoreBlogSectionRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/StoreBlogSectionRequest'
      responses:
        '201':
          description: Section created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Section'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '422':
          $ref: '#/components/responses/ValidationError'

  /blogs/{blog}/sections/{section}:
    put:
      tags: [Sections]
      summary: Update section
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BlogId'
        - $ref: '#/components/parameters/SectionId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UpdateBlogSectionRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBlogSectionRequest'
      responses:
        '200':
          description: Section updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Section'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Sections]
      summary: Delete section
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BlogId'
        - $ref: '#/components/parameters/SectionId'
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'

  /blogs/{blog}/sections/reorder:
    put:
      tags: [Sections]
      summary: Reorder blog sections
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BlogId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderBlogSectionsRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessBlog'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '422':
          $ref: '#/components/responses/ValidationError'

  /comments:
    post:
      tags: [Comments]
      summary: Create comment for post/blog
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreCommentPayload'
      responses:
        '201':
          $ref: '#/components/responses/SuccessComment'
        '401':
          $ref: '#/components/responses/Error401'
        '422':
          $ref: '#/components/responses/ValidationError'

  /comments/{comment}:
    get:
      tags: [Comments]
      summary: Show comment
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CommentId'
      responses:
        '200':
          $ref: '#/components/responses/SuccessComment'
        '401':
          $ref: '#/components/responses/Error401'
        '404':
          $ref: '#/components/responses/Error404'
    post:
      tags: [Comments]
      summary: Update comment
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CommentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                body:
