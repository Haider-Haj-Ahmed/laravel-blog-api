components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum

  parameters:
    PostId:
      name: post
      in: path
      required: true
      schema:
        type: integer
    BlogId:
      name: blog
      in: path
      required: true
      schema:
        type: integer
    CommentId:
      name: comment
      in: path
      required: true
      schema:
        type: integer
    SectionId:
      name: section
      in: path
      required: true
      schema:
        type: integer
    PhotoId:
      name: photo
      in: path
      required: true
      schema:
        type: integer

  responses:
    SuccessNoData:
      description: Success (no data payload)
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/SuccessEnvelope'
              - type: object
                properties:
                  data:
                    nullable: true
                    example: null

    SuccessAny:
      description: Success envelope with endpoint-specific data
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessEnvelope'

    SuccessPost:
      description: Success with Post payload
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/SuccessEnvelope'
              - type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Post'

    SuccessBlog:
      description: Success with Blog payload
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/SuccessEnvelope'
              - type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Blog'

    SuccessComment:
      description: Success with Comment payload
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/SuccessEnvelope'
              - type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Comment'

    SuccessProfile:
      description: Success with Profile payload
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/SuccessEnvelope'
              - type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Profile'

    PaginatedPosts:
      description: Paginated posts
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/PaginatedEnvelope'
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Post'

    PaginatedBlogs:
      description: Paginated blogs
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/PaginatedEnvelope'
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Blog'

    PaginatedComments:
      description: Paginated comments
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/PaginatedEnvelope'
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Comment'

    CommentLikeStatus:
      description: Comment engagement state
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/SuccessEnvelope'
              - type: object
                properties:
                  data:
                    type: object
                    properties:
                      likes:
                        type: integer
                      dislikes:
                        type: integer
                      is_liked_by_user:
                        type: boolean

    Error400:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Error401:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Error403:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Error404:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Error429:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorEnvelope'

  schemas:
    SuccessEnvelope:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [success]
        message:
          type: string
          nullable: true
        data:
          nullable: true

    ErrorEnvelope:
      type: object
      required: [status, message]
      properties:
        status:
          type: string
          enum: [error]
        message:
          type: string
        errors:
          type: object
          additionalProperties: true
          nullable: true

    ValidationErrorEnvelope:
      allOf:
        - $ref: '#/components/schemas/ErrorEnvelope'
        - type: object
          properties:
